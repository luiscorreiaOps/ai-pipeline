name: CI/CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      # Test code
      - name: Run tests
        env:
          PYTHONPATH: $PYTHONPATH:. 
        run: |
          python3 -m pytest

      # Docker build and push (if applicable)
      - name: Build and push Docker image
        if: github.event.action == 'push'
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-repo:${GITHUB_SHA}